server:
  port: 8088

spring:
  application:
    name: px_service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/px_site?useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:654321}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:root}
      password: ${REDIS_PASSWORD:654321}
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  jwt:
    key-secret: ${JWT_KEY_SECRET:12345678901234567890123456789012}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.px_service.domain

logging:
  file:
    name: logs/app.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/app-%d{yyyy-MM-dd}.%i.log
      max-history: 30
      max-file-size: 100MB
      total-size-cap: 5GB
